<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Business cards mockup">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#eef1f6" />
            <stop offset="1" stop-color="#dee3ec" />
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff" />
            <stop offset="1" stop-color="#f6f7fa" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0a1226" flood-opacity=".18" />
        </filter>
    </defs>

    <rect width="400" height="400" fill="url(#bg)" />

    <!-- back card (peeking out) -->
    <g filter="url(#shadow)" transform="translate(118 168) rotate(-8)">
        <rect width="200" height="120" rx="6" fill="url(#card)" />
        <rect x="14" y="14" width="60" height="6" rx="3" fill="#2b6cff" />
        <rect x="14" y="30" width="120" height="4" rx="2" fill="#c8cfdb" />
        <rect x="14" y="42" width="90"  height="4" rx="2" fill="#c8cfdb" />
        <circle cx="170" cy="92" r="14" fill="#2b6cff" opacity=".15" />
        <circle cx="170" cy="92" r="6"  fill="#2b6cff" />
    </g>

    <!-- front card -->
    <g filter="url(#shadow)" transform="translate(96 116) rotate(5)">
        <rect width="208" height="124" rx="6" fill="url(#card)" />
        <text x="18" y="36" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1a1d24">
            Jane Doe
        </text>
        <text x="18" y="54" font-family="system-ui, sans-serif" font-size="9" fill="#5b6473">
            Creative Director
        </text>
        <rect x="18" y="68"  width="120" height="3" rx="1.5" fill="#e3e6ec" />
        <rect x="18" y="78"  width="100" height="3" rx="1.5" fill="#e3e6ec" />
        <rect x="18" y="88"  width="80"  height="3" rx="1.5" fill="#e3e6ec" />
        <rect x="18" y="100" width="50"  height="3" rx="1.5" fill="#e3e6ec" />

        <!-- logo mark -->
        <g transform="translate(160 84)">
            <rect width="32" height="32" rx="6" fill="#2b6cff" />
            <path d="M9 17 l5 5 l9 -10" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>

    <!-- corner ribbon -->
    <text x="200" y="370" font-family="system-ui, sans-serif" font-size="11" fill="#5b6473" text-anchor="middle" letter-spacing=".08em">
        PREMIUM &nbsp;·&nbsp; 350 GSM &nbsp;·&nbsp; MATTE
    </text>
</svg>
